<!DOCTYPE html>
<html lang="en">

<head>
    <title>Flex Display Property</title>
    <meta charset="UTF-8"> <!-- Can be in uppercase -->

    <style>
        body {
            font-size: 1.5em;
        }

        /* main is the container */
        .container {
            display: grid;
            border: .25em solid green;
            grid-template-columns: 9em 4.5em; /* (2 columns, 9em width and 4.5em width ) We can use auto instead of 4em */
            grid-template-rows: 3em 6em; /* (2 rows, 3em height, 6em height) */
            justify-content: space-around;
            /* Try space-between, space-evenly */
            text-align: center;

            /* You can modify gaps with the following two properties (currently disabled). */
            
            row-gap: 1em; 
            column-gap: 1em;
           
        }

        section {
            border: .125em solid blue;
        }
    </style>
</head>

<body>
    <div class="container">
        <section>One</section>
        <section>Two</section>
        <section>Three</section>
        <section>Four</section>
    </div>

</body>

</html>
